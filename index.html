<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>הוועד - משחק הבניין</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Segoe UI', 'Arial', sans-serif;
  background: #111b21;
  color: #e9edef;
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  direction: rtl;
}

/* ─── INTRO / EPISODE SELECT ─── */
#intro-screen {
  position: fixed;
  inset: 0;
  background: linear-gradient(160deg, #0a1929 0%, #0b141a 60%, #063020 100%);
  z-index: 200;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 18px;
  overflow-y: auto;
  padding: 20px;
}
#intro-screen.hidden { animation: fadeOut 0.5s ease forwards; }
@keyframes fadeOut { to { opacity: 0; pointer-events: none; } }

.intro-logo { font-size: 72px; animation: bounce 1.8s ease-in-out infinite alternate; }
@keyframes bounce { from { transform: translateY(0) rotate(-3deg); } to { transform: translateY(-12px) rotate(3deg); } }
.intro-title { font-size: 36px; font-weight: 800; color: #00a884; letter-spacing: -1px; }
.intro-subtitle { font-size: 15px; color: #8696a0; text-align: center; max-width: 340px; line-height: 1.5; }

/* Episode select grid */
#ep-select-label {
  font-size: 11px;
  color: #8696a0;
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-top: 4px;
}
#ep-grid {
  display: flex;
  gap: 14px;
  flex-wrap: wrap;
  justify-content: center;
  max-width: 560px;
}
.ep-card {
  background: rgba(255,255,255,0.04);
  border: 1px solid #2a3942;
  border-radius: 14px;
  padding: 18px 22px;
  text-align: center;
  width: 230px;
  cursor: pointer;
  transition: all 0.22s;
  position: relative;
}
.ep-card:hover {
  border-color: #00a884;
  background: rgba(0,168,132,0.08);
  transform: translateY(-3px);
  box-shadow: 0 8px 28px rgba(0,168,132,0.2);
}
.ep-card.locked {
  opacity: 0.45;
  cursor: not-allowed;
}
.ep-card.locked:hover {
  border-color: #2a3942;
  background: rgba(255,255,255,0.04);
  transform: none;
  box-shadow: none;
}
.ep-card-emoji { font-size: 36px; margin-bottom: 8px; }
.ep-card-num { font-size: 10px; color: #8696a0; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 4px; }
.ep-card-title { font-size: 20px; font-weight: 700; color: #e9edef; margin-bottom: 6px; }
.ep-card-sub { font-size: 12px; color: #8696a0; line-height: 1.5; }
.ep-lock-badge {
  position: absolute;
  top: 10px;
  left: 10px;
  font-size: 16px;
}
.ep-play-hint {
  margin-top: 10px;
  font-size: 12px;
  color: #00a884;
  font-weight: 600;
}

/* ─── HEADER ─── */
#header {
  background: #202c33;
  padding: 10px 16px;
  display: flex;
  align-items: center;
  gap: 12px;
  border-bottom: 1px solid #2a3942;
  flex-shrink: 0;
  z-index: 10;
}
#header-avatar {
  width: 42px; height: 42px;
  border-radius: 50%;
  background: #00a884;
  display: flex; align-items: center; justify-content: center;
  font-size: 22px;
  flex-shrink: 0;
}
#header-info { flex: 1; }
#header-title { font-size: 16px; font-weight: 600; color: #e9edef; }
#header-sub { font-size: 12px; color: #8696a0; margin-top: 1px; }
.header-icons { display: flex; gap: 16px; color: #aebac1; font-size: 20px; }

/* ─── GOAL BAR ─── */
#goal-bar {
  background: #1a2530;
  padding: 7px 16px;
  display: flex;
  align-items: center;
  gap: 10px;
  border-bottom: 1px solid #2a3942;
  flex-shrink: 0;
}
#goal-label { font-size: 11px; color: #8696a0; white-space: nowrap; }
#goal-text { font-size: 12px; color: #00a884; flex: 1; }
#goal-bar-outer { width: 80px; height: 5px; background: #2a3942; border-radius: 3px; overflow: hidden; flex-shrink: 0; }
#goal-bar-fill { height: 100%; background: #00a884; border-radius: 3px; width: 0%; transition: width 0.6s ease; }

/* ─── MAIN ─── */
#main { display: flex; flex: 1; overflow: hidden; }

/* ─── SIDEBAR ─── */
#sidebar {
  width: 198px;
  background: #111b21;
  border-right: 1px solid #2a3942;
  overflow-y: auto;
  padding: 10px 8px;
  flex-shrink: 0;
}
#sidebar::-webkit-scrollbar { width: 4px; }
#sidebar::-webkit-scrollbar-thumb { background: #2a3942; border-radius: 2px; }
#sidebar-title { font-size: 10px; color: #8696a0; text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 12px; text-align: center; padding-top: 4px; }
.neighbor-card {
  background: #1f2c34;
  border-radius: 10px;
  padding: 8px 10px;
  margin-bottom: 8px;
  transition: background 0.4s;
}
.neighbor-card.pos-flash { animation: posFlash 0.7s ease; }
.neighbor-card.neg-flash { animation: negFlash 0.7s ease; }
@keyframes posFlash { 0%,100%{background:#1f2c34} 40%{background:#1a3a28} }
@keyframes negFlash { 0%,100%{background:#1f2c34} 40%{background:#3a1f1f} }
.nb-header { display: flex; align-items: center; gap: 7px; margin-bottom: 6px; }
.nb-avatar { width: 26px; height: 26px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 800; color: #fff; flex-shrink: 0; }
.nb-name { font-size: 11px; color: #e9edef; font-weight: 600; flex: 1; }
.nb-score { font-size: 10px; color: #8696a0; }
.nb-bar { height: 4px; background: #2a3942; border-radius: 2px; overflow: hidden; }
.nb-fill { height: 100%; border-radius: 2px; transition: width 0.9s cubic-bezier(.25,.46,.45,.94); }
.nb-vibe { font-size: 10px; color: #8696a0; margin-top: 5px; font-style: italic; }

/* ─── CHAT ─── */
#chat-col { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
#chat-messages {
  flex: 1;
  overflow-y: auto;
  padding: 10px 14px 6px;
  background: #0b141a;
}
#chat-messages::-webkit-scrollbar { width: 5px; }
#chat-messages::-webkit-scrollbar-thumb { background: #2a3942; border-radius: 3px; }

/* ─── DATE DIVIDER ─── */
.date-divider { text-align: center; margin: 12px 0; }
.date-divider span { background: #182229; color: #8696a0; font-size: 11px; padding: 4px 12px; border-radius: 8px; border: 1px solid #2a3942; }

/* ─── MESSAGE ─── */
.msg-wrap {
  display: flex;
  flex-direction: column;
  margin-bottom: 3px;
  animation: msgIn 0.25s ease;
}
@keyframes msgIn { from { opacity:0; transform: translateY(6px); } to { opacity:1; transform: translateY(0); } }
.msg-wrap.player { align-items: flex-start; }
.msg-wrap.other  { align-items: flex-end; }
.msg-inner { display: flex; align-items: flex-end; gap: 6px; max-width: 78%; }
.msg-wrap.player .msg-inner { flex-direction: row-reverse; }
.msg-avatar { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 800; color: #fff; flex-shrink: 0; margin-bottom: 2px; }
.msg-bubble {
  padding: 7px 10px 20px 10px;
  border-radius: 8px;
  font-size: 14px;
  line-height: 1.45;
  position: relative;
  word-break: break-word;
}
.msg-wrap.other  .msg-bubble { background: #202c33; border-radius: 0 8px 8px 8px; }
.msg-wrap.player .msg-bubble { background: #005c4b; border-radius: 8px 0 8px 8px; }
.msg-sender { font-size: 12px; font-weight: 600; margin-bottom: 2px; padding-right: 34px; }
.msg-meta { position: absolute; bottom: 4px; left: 8px; display: flex; align-items: center; gap: 3px; font-size: 11px; color: #8696a0; white-space: nowrap; }
.msg-wrap.player .msg-meta { right: 8px; left: auto; }
.receipts { color: #53bdeb; font-size: 13px; }
.emoji-msg .msg-bubble { background: transparent !important; font-size: 38px; padding: 4px 8px 20px 8px; }

/* ─── TYPING ─── */
#typing-area {
  padding: 2px 14px 6px;
  display: none;
  animation: msgIn 0.2s ease;
}
#typing-area.on { display: flex; align-items: center; gap: 8px; }
.typing-pill { background: #202c33; border-radius: 16px; padding: 8px 14px; display: flex; gap: 4px; align-items: center; }
.t-dot { width: 6px; height: 6px; border-radius: 50%; background: #8696a0; animation: tpulse 1.3s ease infinite; }
.t-dot:nth-child(2) { animation-delay: 0.2s; }
.t-dot:nth-child(3) { animation-delay: 0.4s; }
@keyframes tpulse { 0%,60%,100%{transform:scale(1);opacity:0.4} 30%{transform:scale(1.3);opacity:1} }
#typing-name { font-size: 12px; color: #8696a0; }

/* ─── CHOICES ─── */
#choice-area {
  background: #182229;
  border-top: 1px solid #2a3942;
  padding: 10px 12px 12px;
  flex-shrink: 0;
  display: none;
}
#choice-area.on { display: block; }
#choice-hint { font-size: 11px; color: #8696a0; text-align: center; margin-bottom: 8px; }
.choice-btn {
  display: flex;
  align-items: flex-start;
  gap: 8px;
  width: 100%;
  background: #202c33;
  border: 1px solid #2a3942;
  border-radius: 12px;
  padding: 10px 14px;
  color: #e9edef;
  font-size: 14px;
  text-align: right;
  cursor: pointer;
  margin-bottom: 7px;
  direction: rtl;
  transition: all 0.18s;
  font-family: inherit;
  line-height: 1.4;
}
.choice-btn:hover { background: #243447; border-color: #00a884; transform: translateX(-2px); }
.choice-btn:active { transform: scale(0.97); }
.choice-letter { color: #00a884; font-weight: 800; font-size: 15px; flex-shrink: 0; margin-top: 1px; }

/* ─── NOTIFICATION ─── */
#notif {
  position: fixed;
  top: 66px;
  left: 50%;
  transform: translateX(-50%) translateY(-80px);
  background: #1f2c34;
  border: 1px solid #2a3942;
  border-radius: 10px;
  padding: 8px 18px;
  font-size: 13px;
  color: #e9edef;
  z-index: 60;
  transition: transform 0.35s cubic-bezier(.34,1.56,.64,1);
  white-space: nowrap;
  box-shadow: 0 4px 24px rgba(0,0,0,0.5);
  pointer-events: none;
}
#notif.show { transform: translateX(-50%) translateY(0); }

/* ─── END SCREEN ─── */
#end-screen {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.88);
  z-index: 100;
  align-items: center;
  justify-content: center;
}
#end-screen.on { display: flex; animation: msgIn 0.4s ease; }
#end-card {
  background: #1f2c34;
  border-radius: 18px;
  padding: 28px 28px 24px;
  max-width: 460px;
  width: 92%;
  text-align: center;
  border: 1px solid #2a3942;
  max-height: 92vh;
  overflow-y: auto;
}
#end-card::-webkit-scrollbar { width: 4px; }
#end-card::-webkit-scrollbar-thumb { background: #2a3942; }
#end-newspaper {
  background: #111b21;
  border: 1px solid #2a3942;
  border-radius: 10px;
  padding: 14px 18px;
  margin-bottom: 18px;
  text-align: right;
}
.newspaper-title { font-size: 11px; color: #8696a0; border-bottom: 1px solid #2a3942; padding-bottom: 6px; margin-bottom: 8px; letter-spacing: 1px; }
#end-headline { font-size: 18px; font-weight: 800; color: #e9edef; line-height: 1.3; margin-bottom: 4px; }
#end-sub { font-size: 12px; color: #8696a0; font-style: italic; }
#end-badge {
  background: #2a3942;
  border-radius: 12px;
  padding: 12px 16px;
  margin: 0 0 18px;
  display: flex;
  align-items: center;
  gap: 12px;
  text-align: right;
}
.badge-icon { font-size: 30px; flex-shrink: 0; }
.badge-info { flex: 1; }
.badge-title { font-size: 12px; color: #8696a0; margin-bottom: 2px; }
.badge-label { font-size: 14px; font-weight: 600; color: #e9edef; }
#end-meters { margin-bottom: 18px; }
.end-meter-row { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
.em-avatar { width: 34px; height: 34px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 800; color: #fff; flex-shrink: 0; }
.em-info { flex: 1; text-align: right; }
.em-name { font-size: 13px; color: #e9edef; font-weight: 600; }
.em-vibe { font-size: 11px; color: #8696a0; margin-top: 1px; }
.em-bar { height: 5px; background: #2a3942; border-radius: 3px; overflow: hidden; margin-top: 5px; }
.em-fill { height: 100%; border-radius: 3px; width: 0%; transition: width 1s ease; }

/* End screen buttons row */
#end-btns { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
#replay-btn, #ep-select-btn {
  border: none;
  border-radius: 26px;
  padding: 13px 28px;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  font-family: inherit;
  transition: all 0.2s;
}
#replay-btn {
  background: #00a884;
  color: #fff;
  box-shadow: 0 3px 16px rgba(0,168,132,0.3);
}
#replay-btn:hover { background: #00c9a0; transform: scale(1.04); }
#ep-select-btn {
  background: #2a3942;
  color: #e9edef;
}
#ep-select-btn:hover { background: #3a4f5c; transform: scale(1.04); }

/* ─── MOBILE ─── */
@media (max-width: 580px) {
  #sidebar { display: none; }
  .ep-card { width: 100%; }
}
</style>
</head>
<body>

<!-- INTRO / EPISODE SELECT -->
<div id="intro-screen">
  <div class="intro-logo">🏠</div>
  <div class="intro-title">הוועד</div>
  <div class="intro-subtitle">סימולטור קבוצת הווטסאפ של הבניין הישראלי</div>
  <div id="ep-select-label">בחר פרק</div>
  <div id="ep-grid">
    <!-- cards injected by JS -->
  </div>
</div>

<!-- NOTIFICATION -->
<div id="notif"></div>

<!-- HEADER -->
<div id="header">
  <div id="header-avatar">🏠</div>
  <div id="header-info">
    <div id="header-title">ועד הבניין | 6 משתתפים</div>
    <div id="header-sub">מרים, יוסי, ליאת ואיתי, אורי, ולנטינה</div>
  </div>
  <div class="header-icons">🔍 ⋮</div>
</div>

<!-- GOAL BAR -->
<div id="goal-bar">
  <div id="goal-label">🎯 מטרה:</div>
  <div id="goal-text">טוען...</div>
  <div id="goal-bar-outer"><div id="goal-bar-fill"></div></div>
</div>

<!-- MAIN AREA -->
<div id="main">

  <!-- SIDEBAR -->
  <div id="sidebar">
    <div id="sidebar-title">יחסי שכנות</div>
    <div id="nb-list"></div>
  </div>

  <!-- CHAT COLUMN -->
  <div id="chat-col">
    <div id="chat-messages">
      <div class="date-divider"><span>היום, יום שני</span></div>
    </div>
    <div id="typing-area">
      <div class="typing-pill">
        <div class="t-dot"></div><div class="t-dot"></div><div class="t-dot"></div>
      </div>
      <div id="typing-name"></div>
    </div>
    <div id="choice-area">
      <div id="choice-hint">💬 בחר את התגובה שלך</div>
      <div id="choices-list"></div>
    </div>
  </div>

</div>

<!-- END SCREEN -->
<div id="end-screen">
  <div id="end-card">
    <div id="end-newspaper">
      <div class="newspaper-title">📰 ידיעות הבניין — גיליון מיוחד</div>
      <div id="end-headline"></div>
      <div id="end-sub"></div>
    </div>
    <div id="end-badge">
      <div class="badge-icon" id="badge-icon"></div>
      <div class="badge-info">
        <div class="badge-title">תואר שהרווחת:</div>
        <div class="badge-label" id="badge-label"></div>
      </div>
    </div>
    <div id="end-meters"></div>
    <div id="end-btns">
      <button id="replay-btn" onclick="replayEpisode()">שחק שוב 🔄</button>
      <button id="ep-select-btn" onclick="showEpisodeSelect()">בחר פרק 🏠</button>
    </div>
  </div>
</div>

<!-- External data files -->
<script src="characters.js"></script>
<script src="episodes/episode-1.js"></script>
<script src="episodes/episode-2.js"></script>

<script>
"use strict";

// ─── EPISODES REGISTRY ────────────────────────────────────────
const EPISODES = [EPISODE_1, EPISODE_2];

// ─── ENGINE STATE ─────────────────────────────────────────────
let currentEpisode = null;
let scores = {};
let goalPct = 0;
let currentPath = null;   // last path chosen (carries across beats)
let msgTime = { h: 10, m: 28 };
let queue = [];
let busy = false;
let choiceDone = null;

// ─── TIME ──────────────────────────────────────────────────────
function tick() {
  msgTime.m += Math.floor(Math.random() * 2) + 1;
  if (msgTime.m >= 60) { msgTime.m -= 60; msgTime.h++; }
  return pad(msgTime.h) + ':' + pad(msgTime.m);
}
function pad(n) { return String(n).padStart(2, '0'); }

// ─── AUDIO ─────────────────────────────────────────────────────
let actx = null;
function beep(freq, dur) {
  try {
    if (!actx) actx = new (window.AudioContext || window.webkitAudioContext)();
    const o = actx.createOscillator();
    const g = actx.createGain();
    o.connect(g); g.connect(actx.destination);
    o.frequency.value = freq || 880;
    g.gain.setValueAtTime(0.08, actx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, actx.currentTime + (dur || 0.12));
    o.start(); o.stop(actx.currentTime + (dur || 0.12));
  } catch(e) {}
}

// ─── METER HELPERS ─────────────────────────────────────────────
function meterColor(s) {
  if (s >= 70) return '#00a884';
  if (s >= 40) return '#ffc107';
  return '#f44336';
}
function vibeText(s) {
  if (s >= 85) return 'מאוהב/ת בך 😍';
  if (s >= 70) return 'אוהד/ת אותך 😊';
  if (s >= 50) return 'בסדר איתך 🙂';
  if (s >= 35) return 'לא בטוח/ה 🤔';
  if (s >= 20) return 'מרוגז/ת ממך 😤';
  return 'שונא/ת אותך 🤬';
}

// ─── SIDEBAR ───────────────────────────────────────────────────
function renderSidebar() {
  const list = document.getElementById('nb-list');
  if (!currentEpisode) { list.innerHTML = ''; return; }
  list.innerHTML = currentEpisode.activeChars.map(id => {
    const c = CHARACTERS[id];
    const s = scores[id] || 50;
    return `
      <div class="neighbor-card" id="nb-${id}">
        <div class="nb-header">
          <div class="nb-avatar" style="background:${c.color}">${c.avatar}</div>
          <div class="nb-name">${c.name}</div>
          <div class="nb-score">${Math.round(s)}</div>
        </div>
        <div class="nb-bar">
          <div class="nb-fill" style="width:${s}%;background:${meterColor(s)}"></div>
        </div>
        <div class="nb-vibe">${vibeText(s)}</div>
      </div>
    `;
  }).join('');
}

function flashCard(id, positive) {
  const el = document.getElementById('nb-' + id);
  if (!el) return;
  el.classList.remove('pos-flash', 'neg-flash');
  void el.offsetWidth;
  el.classList.add(positive ? 'pos-flash' : 'neg-flash');
  setTimeout(() => el.classList.remove('pos-flash', 'neg-flash'), 800);
}

function changeScore(id, delta) {
  if (!(id in scores)) return;
  scores[id] = Math.max(0, Math.min(100, scores[id] + delta));
  renderSidebar();
  flashCard(id, delta > 0);
  const c = CHARACTERS[id];
  notify((delta > 0 ? '📈 +' : '📉 ') + Math.abs(delta) + ' עם ' + c.name);
}

// ─── GOAL BAR ──────────────────────────────────────────────────
function setGoal(pct) {
  goalPct = Math.max(0, Math.min(100, pct));
  document.getElementById('goal-bar-fill').style.width = goalPct + '%';
}

// ─── NOTIFY ────────────────────────────────────────────────────
let notifTimer = null;
function notify(text) {
  const el = document.getElementById('notif');
  el.textContent = text;
  el.classList.add('show');
  if (notifTimer) clearTimeout(notifTimer);
  notifTimer = setTimeout(() => el.classList.remove('show'), 2800);
}

// ─── ADD MESSAGE ───────────────────────────────────────────────
function addMsg(opts) {
  // opts: { charId?, text, isPlayer?, isEmoji? }
  const chat = document.getElementById('chat-messages');
  const c = (opts.charId && CHARACTERS[opts.charId]) ? CHARACTERS[opts.charId] : null;
  const isPlayer = !!opts.isPlayer;
  const isEmoji  = !!opts.isEmoji;
  const t = tick();

  const wrap = document.createElement('div');
  wrap.className = 'msg-wrap ' + (isPlayer ? 'player' : 'other');
  if (isEmoji) wrap.classList.add('emoji-msg');

  const senderHtml = (!isPlayer && c)
    ? `<div class="msg-sender" style="color:${c.color}">${c.name}</div>` : '';

  const avatarHtml = (!isPlayer && c)
    ? `<div class="msg-avatar" style="background:${c.color}">${c.avatar}</div>` : '';

  const receipts = isPlayer ? `<span class="receipts">✓✓</span>` : '';

  wrap.innerHTML = `
    ${senderHtml}
    <div class="msg-inner">
      ${avatarHtml}
      <div class="msg-bubble">
        ${opts.text}
        <div class="msg-meta"><span>${t}</span>${receipts}</div>
      </div>
    </div>
  `;

  chat.appendChild(wrap);
  chat.scrollTop = chat.scrollHeight;

  if (!isPlayer) beep(780 + Math.random() * 120, 0.1);
}

// ─── TYPING ────────────────────────────────────────────────────
function showTyping(name) {
  const el = document.getElementById('typing-area');
  document.getElementById('typing-name').textContent = name + ' מקליד/ה...';
  el.classList.add('on');
  document.getElementById('chat-messages').scrollTop = 9999;
}
function hideTyping() {
  document.getElementById('typing-area').classList.remove('on');
}

// ─── QUEUE SYSTEM ──────────────────────────────────────────────
function enq(fn) { queue.push(fn); pump(); }

function pump() {
  if (busy || queue.length === 0) return;
  busy = true;
  queue.shift()(() => { busy = false; pump(); });
}

// Queue a NPC message
function qMsg(charId, text, typingMs, pauseMs, isEmoji) {
  enq((done) => {
    const c = CHARACTERS[charId];
    showTyping(c.name);
    setTimeout(() => {
      hideTyping();
      addMsg({ charId, text, isEmoji: !!isEmoji });
      setTimeout(done, pauseMs || 250);
    }, typingMs || 1200);
  });
}

// Queue a simple notification (no typing bubble)
function qNotify(text, delayMs) {
  enq((done) => {
    setTimeout(() => { notify(text); done(); }, delayMs || 600);
  });
}

// Queue a wait
function qWait(ms) {
  enq((done) => setTimeout(done, ms));
}

// Queue a choice prompt
function qChoicePrompt(choices) {
  enq((done) => {
    renderChoices(choices);
    choiceDone = done;
  });
}

// ─── CHOICES ───────────────────────────────────────────────────
function renderChoices(choices) {
  const area  = document.getElementById('choice-area');
  const list  = document.getElementById('choices-list');
  const letters = ['א', 'ב', 'ג', 'ד'];

  list.innerHTML = choices.map((c, i) => `
    <button class="choice-btn" onclick="makeChoice(${i})">
      <span class="choice-letter">${letters[i]})</span>
      <span>${c.text}</span>
    </button>
  `).join('');

  area.classList.add('on');
  window._pendingChoices = choices;
}

function makeChoice(i) {
  const area = document.getElementById('choice-area');
  area.classList.remove('on');

  const choice = window._pendingChoices[i];
  window._pendingChoices = null;

  // Show player bubble
  addMsg({ text: choice.text, isPlayer: true, isEmoji: !!choice.isEmoji });
  beep(660, 0.08);

  // Apply relationship effects
  if (choice.effects) {
    Object.entries(choice.effects).forEach(([id, v]) => changeScore(id, v));
  }

  // Apply goal delta
  if (choice.goalDelta) setGoal(goalPct + choice.goalDelta);

  // Store path for branching (only overwrite if explicitly set)
  if (choice.path !== undefined && choice.path !== null) {
    currentPath = choice.path;
  }

  const cb = choiceDone;
  choiceDone = null;

  // Route to the next beat
  if (choice.next) {
    if (cb) cb();
    runBeat(choice.next);
  } else {
    if (cb) cb();
  }
}

// ─── BEAT RUNNER ───────────────────────────────────────────────
function runBeat(beatId) {
  const beat = currentEpisode.beats.find(b => b.id === beatId);
  if (!beat) { console.warn('Beat not found:', beatId); return; }

  // ── Branch messages: pick by currentPath or "default" ──
  if (beat.branchMessages) {
    const msgs = beat.branchMessages[currentPath] || beat.branchMessages["default"] || [];
    msgs.forEach(m => qMsg(m.from, m.text, m.typingMs, m.delay, m.isEmoji));
    if (beat.autoNext) {
      enq((done) => { done(); runBeat(beat.autoNext); });
    }
    return;
  }

  // ── Regular beat: queue messages then choices or ending ──
  if (beat.messages) {
    beat.messages.forEach(m => {
      if (m.from === "_notify") {
        qNotify(m.text, m.delay);
      } else {
        qMsg(m.from, m.text, m.typingMs, m.delay, m.isEmoji);
      }
    });
  }

  // Ending beat
  if (beat.ending) {
    enq((done) => {
      setGoal(currentEpisode.endings[beat.ending].goalScore || 100);
      setTimeout(() => showEnd(beat.ending), 800);
      done();
    });
    return;
  }

  // Choice beat
  if (beat.choices) {
    qChoicePrompt(beat.choices);
    return;
  }

  // autoNext (no choices, no ending)
  if (beat.autoNext) {
    enq((done) => { done(); runBeat(beat.autoNext); });
  }
}

// ─── LOAD EPISODE ──────────────────────────────────────────────
function loadEpisode(episode) {
  currentEpisode = episode;

  // Reset state
  scores = Object.assign({}, episode.initialScores);
  goalPct = 0;
  currentPath = null;
  msgTime = { h: 10, m: 28 };
  queue = [];
  busy = false;
  choiceDone = null;
  window._pendingChoices = null;

  // Reset UI
  document.getElementById('chat-messages').innerHTML =
    `<div class="date-divider"><span>${episode.dateLabel || 'היום'}</span></div>`;
  document.getElementById('choice-area').classList.remove('on');
  document.getElementById('choices-list').innerHTML = '';
  hideTyping();
  setGoal(0);
  document.getElementById('goal-text').textContent = episode.goal;

  renderSidebar();

  // Start at first beat
  runBeat(episode.beats[0].id);
}

// ─── END SCREEN ────────────────────────────────────────────────
function showEnd(endingKey) {
  const d = currentEpisode.endings[endingKey];
  if (!d) return;

  document.getElementById('end-headline').textContent = d.headline;
  document.getElementById('end-sub').textContent      = d.sub;
  document.getElementById('badge-icon').textContent   = d.badgeIcon;
  document.getElementById('badge-label').textContent  = d.badgeLabel;

  const metersDiv = document.getElementById('end-meters');
  metersDiv.innerHTML =
    '<div style="font-size:12px;color:#8696a0;margin-bottom:12px;text-align:right">📊 יחסי שכנות סופיים:</div>' +
    currentEpisode.activeChars.map(id => {
      const c = CHARACTERS[id];
      const s = scores[id] || 50;
      return `
        <div class="end-meter-row">
          <div class="em-avatar" style="background:${c.color}">${c.avatar}</div>
          <div class="em-info">
            <div class="em-name">${c.name}</div>
            <div class="em-vibe">${vibeText(s)}</div>
            <div class="em-bar">
              <div class="em-fill" id="emf-${id}" style="background:${meterColor(s)}" data-val="${s}"></div>
            </div>
          </div>
        </div>
      `;
    }).join('');

  document.getElementById('end-screen').classList.add('on');
  beep(660, 0.3);

  setTimeout(() => {
    document.querySelectorAll('.em-fill').forEach(el => {
      el.style.width = el.dataset.val + '%';
    });
  }, 200);
}

// ─── REPLAY CURRENT EPISODE ────────────────────────────────────
function replayEpisode() {
  document.getElementById('end-screen').classList.remove('on');
  if (currentEpisode) loadEpisode(currentEpisode);
}

// ─── EPISODE SELECT SCREEN ─────────────────────────────────────
function showEpisodeSelect() {
  document.getElementById('end-screen').classList.remove('on');
  const intro = document.getElementById('intro-screen');
  intro.style.display  = 'flex';
  intro.style.animation = 'none';
  intro.style.opacity  = '1';
  intro.style.pointerEvents = 'auto';
  intro.classList.remove('hidden');
}

function buildEpisodeCards() {
  const grid = document.getElementById('ep-grid');
  grid.innerHTML = EPISODES.map(ep => {
    const locked = false; // all unlocked for now
    return `
      <div class="ep-card${locked ? ' locked' : ''}" onclick="${locked ? '' : `startEpisode(${ep.id})`}">
        ${locked ? '<div class="ep-lock-badge">🔒</div>' : ''}
        <div class="ep-card-emoji">${ep.emoji || '🏠'}</div>
        <div class="ep-card-num">פרק ${ep.id}</div>
        <div class="ep-card-title">${ep.title}</div>
        <div class="ep-card-sub">${ep.subtitle}</div>
        ${!locked ? '<div class="ep-play-hint">▶ שחק עכשיו</div>' : ''}
      </div>
    `;
  }).join('');
}

function startEpisode(id) {
  beep(660, 0.1);

  const episode = EPISODES.find(e => e.id === id);
  if (!episode) return;

  const intro = document.getElementById('intro-screen');
  intro.classList.add('hidden');
  setTimeout(() => { intro.style.display = 'none'; }, 600);

  loadEpisode(episode);
}

// ─── INIT ──────────────────────────────────────────────────────
buildEpisodeCards();
renderSidebar();
</script>
